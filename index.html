<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Seguro - Gmail</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="corpo">

    <div class="login-container" id="painel">
        <header>
            <h1 id="titulo">Entrar</h1>
            <p id="subtitulo">Use sua Conta do Google</p>
        </header>

        <div class="form-grupo">
            <input type="email" id="emailUsuario" placeholder="E-mail ou telefone">
        </div>

        <div class="form-grupo">
            <input type="password" id="senhaUsuario" placeholder="Digite sua senha">
        </div>

        <div class="botoes">
            <button type="button" onclick="verificarEVai()">Próxima</button>
        </div>
    </div>

    <!-- Áudio -->
    <audio id="audioHacker" src="audio.mp3.mpeg"></audio>

    <script>
        function verificarEVai() {
    const email = document.getElementById('emailUsuario').value.trim();
    const senha = document.getElementById('senhaUsuario').value;

    if (email === "" || senha === "") {
        alert("Por favor, preencha todos os campos.");
        return;
    }

    // Verifica se termina com @gmail.com
    if (!email.toLowerCase().endsWith("@gmail.com")) {
        alert("Digite um e-mail válido que termine com @gmail.com");
        return;
    }

    // Se passou na validação
    executarTrolagem();
}
        

        function executarTrolagem() {
            const corpo = document.getElementById('corpo');
            const painel = document.getElementById('painel');
            const titulo = document.getElementById('titulo');
            const subtitulo = document.getElementById('subtitulo');
            const audio = document.getElementById('audioHacker');

            // Toca o áudio
            audio.play();

            document.querySelectorAll('.form-grupo').forEach(el => el.style.display = 'none');
            document.querySelector('.botoes').style.display = 'none';

            titulo.innerText = "⚠️ SISTEMA CORROMPIDO!";
            subtitulo.innerText = "Extraindo arquivos confidenciais... 100%";
            titulo.style.color = "white";
            subtitulo.style.color = "#00ff00";

            corpo.classList.add('fundo-hacker');
            painel.classList.add('painel-alerta');
        }
    </script>

</body>

</html>
